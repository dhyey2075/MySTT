name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    # Align Actions runner JS with GitHub’s Node 24 transition (see GitHub changelog 2025-09).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      # Omit version — resolves exact pnpm from package.json "packageManager" (avoids ERR_PNPM_BAD_PM_VERSION vs pinned Action version).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm exec eslint .

      - name: Typecheck desktop
        run: pnpm --filter @mystt/desktop typecheck

      - name: Tests
        run: pnpm test
